services:
  api:
    build: .
    ports:
       - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db
      - redis
  
  db:
    image: "postgres:15"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: booknest
      POSTGRES_DB: booknest

  redis:
    image: "redis:7-alpine"
    ports:
      - "6379:6379"

volumes:
  postgres_data:
