    x-enum-varnames:
    - PaymentCOD
    - PaymentCreditCard
    - PaymentDebitCard
    - PaymentNetBanking
    - PaymentUPI
host: localhost:8080
info:
  contact:
    email: kolimirakshitha@gmail.com
    name: BookNest API Support
    url: https://booknest.com/support
  description: Production API for BookNest online bookstore. v1 is stable; all endpoints
    require strict request validation and JWT auth where applicable.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://booknest.com/terms/
  title: BookNest API
  version: "1.0"
paths:
  /admin/orders:
    get:
      description: Lists all orders (admin only)
      parameters:
      - description: Result limit
        in: query
        name: limit
        type: integer
      - description: Result offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/OrderView'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all orders
      tags:
      - Orders
  /admin/orders/status:
    put:
      consumes:
      - application/json
      description: Updates an order status as admin
      parameters:
      - description: Admin order status input
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/AdminOrderStatusUpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/OrderView'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update order status
      tags:
      - Orders
  /ai/chat:
    post:
      consumes:
      - application/json
      description: Sends a message to the configured AI provider
      parameters:
      - description: AI chat request
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/domain.AIChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.AIChatResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Chat with AI
      tags:
      - AI
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends password reset link or OTP to email/mobile
      parameters:
      - description: Forgot password input
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/ForgotPasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Forgot password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login using email or mobile and password
      parameters:
      - description: Login credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh token for a new access token
      parameters:
      - description: Refresh token payload
        in: body
        name: payload
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account and sends email & mobile verification
      parameters:
      - description: User registration input
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/UserInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
