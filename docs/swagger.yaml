  ForgotPasswordInput:
    properties:
      email:
        example: rakshitha@example.com
        type: string
      mobile:
        example: "+919876543210"
        type: string
    type: object
  LoginInput:
    properties:
      email:
        example: rakshitha@example.com
        type: string
      mobile:
        example: "+919876543210"
        type: string
      password:
        example: Password@123
        type: string
    required:
