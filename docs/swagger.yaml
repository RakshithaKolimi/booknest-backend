  CheckoutInput:
    properties:
      payment_method:
        allOf:
        - $ref: '#/definitions/domain.PaymentMethod'
        enum:
        - COD
        - CREDIT_CARD
        - DEBIT_CARD
        - NET_BANKING
        - UPI
        example: UPI
