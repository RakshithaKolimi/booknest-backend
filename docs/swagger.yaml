        type: string
    type: object
  UserInput:
    properties:
      email:
        example: rakshitha@example.com
        type: string
      first_name:
        example: Rakshitha
        minLength: 3
        type: string
      last_name:
        example: Koli
        type: string
      mobile:
        example: "+919876543210"
        type: string
      password:
        example: Password@123
