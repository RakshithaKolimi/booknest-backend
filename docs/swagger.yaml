    - last_name
    - mobile
    - password
    - role
    type: object
  UserRole:
    enum:
    - USER
    - ADMIN
    type: string
    x-enum-varnames:
    - UserRoleUser
    - UserRoleAdmin
  domain.AIChatRequest:
    properties:
      message:
        type: string
      prompt:
        type: string
    type: object
  domain.AIChatResponse:
    properties:
      message:
        type: string
      references:
        items:
          $ref: '#/definitions/Book'
        type: array
    type: object
  domain.OrderStatus:
    enum:
    - PENDING
    - FAILED
    - CANCELLED
    - COMPLETED
    type: string
    x-enum-varnames:
    - OrderPending
    - OrderFailed
    - OrderCancelled
    - OrderCompleted
  domain.PaymentMethod:
    enum:
    - COD
    - CREDIT_CARD
    - DEBIT_CARD
    - NET_BANKING
    - UPI
